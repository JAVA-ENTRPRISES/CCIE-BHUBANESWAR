<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admissions 2026 | CIS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <section style="padding: 50px 10%;">
        <div style="max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);">
            <h2 style="color: var(--primary); text-align: center; margin-bottom: 20px;">Admission Inquiry</h2>
            <form action="#">
                <input type="text" placeholder="Student Name" style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px;">
                <select style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px;">
                    <option>Select Grade</option>
                    <option>Nursery - UKG</option>
                    <option>Grade 1 - 5</option>
                    <option>Grade 6 - 10</option>
                </select>
                <input type="email" placeholder="Parent Email" style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px;">
                <input type="tel" placeholder="Phone Number" style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px;">
                <button type="submit" style="width: 100%; padding: 15px; background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">SUBMIT APPLICATION</button>
            </form>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <script src="script.js"></script>
</body>
</html>
