<!DOCTYPE html>
<html lang="en">
<head>
    <title>Facilities | CIS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <section style="padding: 50px 10%;">
        <h1 style="text-align: center; color: var(--primary); margin-bottom: 40px;">Campus Facilities</h1>
        
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px;">
            <div style="background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
                <img src="image/Science students in the lab.png" style="width: 100%; height: 200px; object-fit: cover;">
                <div style="padding: 20px;">
                    <h3>Hi-Tech Science Labs</h3>
                    <p>Equipped with modern apparatus for Physics, Chemistry, and Biology.</p>
                </div>
            </div>
            <div style="background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
                <img src="image/sports.avif" style="width: 100%; height: 200px; object-fit: cover;">
                <div style="padding: 20px;">
                    <h3>Sports Complex</h3>
                    <p>International standard playgrounds for Cricket, Soccer, and Athletics.</p>
                </div>
            </div>
            <div style="background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
                <img src="image/annual function.avif" style="width: 100%; height: 200px; object-fit: cover;">
                <div style="padding: 20px;">
                    <h3>Cultural Studio</h3>
                    <p>A dedicated space for Odissi dance, classical music, and theater.</p>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <script src="script.js"></script>
</body>
</html>
